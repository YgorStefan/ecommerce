# docker-compose.yml
# Orquestra todos os serviços da aplicação: banco de dados, backend e frontend
# Modo: PRODUÇÃO — usa as imagens buildadas pelo Dockerfile multi-stage

services:
  # Serviço do banco de dados PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ecommerce}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ecommerce123}
      POSTGRES_DB: ${DB_NAME:-ecommerce_db}
    ports:
      - '5433:5432'
    volumes:
      # Persiste os dados do banco entre reinicializações do container
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-ecommerce} -d ${DB_NAME:-ecommerce_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  # Serviço do backend NestJS
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      # BUILD_DATE invalida o cache de forma controlada: muda a cada build disparado
      # pelo Makefile/CI, mas não afeta o cache de npm ci (que depende de package.json).
      # Isso garante que o código-fonte seja sempre recopiado sem reinstalar deps.
      args:
        BUILD_DATE: ${BUILD_DATE:-unknown}
        GIT_HASH: ${GIT_HASH:-unknown}
    # pull_policy: build força o Docker a usar a imagem buildada localmente,
    # nunca tentando puxar do registry quando não existe tag de registry configurada.
    pull_policy: build
    container_name: ecommerce_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '${BACKEND_PORT:-3001}:3001'
    depends_on:
      postgres:
        condition: service_healthy

  # Serviço do frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-unknown}
        GIT_HASH: ${GIT_HASH:-unknown}
    pull_policy: build
    container_name: ecommerce_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # URL usada pelo browser do cliente (deve ser acessível externamente)
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      # URL interna usada por Server Components do Next.js dentro da rede Docker
      - INTERNAL_API_URL=http://backend:3001
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    depends_on:
      - backend

# Volumes nomeados para persistência de dados
volumes:
  postgres_data:
    driver: local
