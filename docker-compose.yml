# docker-compose.yml
# Orquestra todos os serviços da aplicação: banco de dados, backend e frontend
# Modo: PRODUÇÃO — usa as imagens buildadas pelo Dockerfile

services:
  # Serviço do banco de dados PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ecommerce}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ecommerce123}
      POSTGRES_DB: ${DB_NAME:-ecommerce_db}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      # Persiste os dados do banco entre reinicializações do container
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-ecommerce} -d ${DB_NAME:-ecommerce_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  # Serviço do backend NestJS
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '${BACKEND_PORT:-3001}:3001'
    depends_on:
      postgres:
        condition: service_healthy
    # Sem volumes de código — usa o que foi buildado na imagem Docker

  # Serviço do frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # URL usada pelo browser do cliente (deve ser acessível externamente)
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      # URL interna usada por Server Components do Next.js dentro da rede Docker
      # Usa o nome do serviço Docker em vez de localhost
      - INTERNAL_API_URL=http://backend:3001
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    depends_on:
      - backend
    # Sem volumes de código — usa o que foi buildado na imagem Docker

# Volumes nomeados para persistência de dados
volumes:
  postgres_data:
    driver: local
